<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HairPort — Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet CSS (ADDED) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
   integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
   crossorigin=""/>
</head>

<body>

<!-- NAVBAR -->
<nav></nav>

<!-- CONTACT -->
<section id="contact" class="sec sec-alt">
  <div class="container">
    <div class="row mb-5">
      <div class="col-lg-6">
        <p class="eyebrow">Get in Touch</p>
        <h2 class="sec-title">Contact Us</h2>
        <div class="gold-rule"></div>
        <p class="sec-sub">Reach out for queries, partnerships, or expert hair care advice.</p>
      </div>
    </div>

    <!-- Contact cards -->
    <div class="row g-4 mb-5">
      <div class="col-sm-6 col-md-3">
        <div class="contact-card">
          <div class="contact-icon"><i class="bi bi-building"></i></div>
          <h6>Company</h6>
          <p>HairPort Inc.</p>
        </div>
      </div>
      <div class="col-sm-6 col-md-3">
        <div class="contact-card">
          <div class="contact-icon"><i class="bi bi-geo-alt"></i></div>
          <h6>Address</h6>
          <p>ABC, Karachi</p>
        </div>
      </div>
      <div class="col-sm-6 col-md-3">
        <div class="contact-card">
          <div class="contact-icon"><i class="bi bi-telephone"></i></div>
          <h6>Phone</h6>
          <p>+92 01 2345 6789</p>
        </div>
      </div>
      <div class="col-sm-6 col-md-3">
        <div class="contact-card">
          <div class="contact-icon"><i class="bi bi-envelope"></i></div>
          <h6>Email</h6>
          <p>info@hairport.com</p>
        </div>
      </div>
    </div>

    <div class="row g-5">
      <!-- Contact Form -->
      <div class="col-lg-6">
        <h4 style="font-size:1.4rem; margin-bottom:24px; color:var(--ink);">Send a Message</h4>
        <div class="contact-form">
          <div class="row g-3">
            <div class="col-sm-6">
              <label>Full Name</label>
              <input type="text" class="form-control" placeholder="Your name"/>
            </div>
            <div class="col-sm-6">
              <label>Email Address</label>
              <input type="email" class="form-control" placeholder="you@email.com"/>
            </div>
            <div class="col-12">
              <label>Topic</label>
              <select class="form-select">
                <option>Select a topic…</option>
                <option>Hair Loss Advice</option>
                <option>Product Recommendation</option>
                <option>Equipment Inquiry</option>
                <option>Partnership</option>
                <option>Other</option>
              </select>
            </div>
            <div class="col-12">
              <label>Message</label>
              <textarea class="form-control" rows="4" placeholder="How can we help you?"></textarea>
            </div>
            <div class="col-12">
              <button class="btn-gold w-100">Send Message</button>
            </div>
          </div>
        </div>
      </div>

      <!-- MAP SECTION (UPDATED ONLY THIS PART) -->
      <div class="col-lg-6">
        <h4 style="font-size:1.4rem; margin-bottom:24px; color:var(--ink);">Our Location</h4>

        <!-- Map Container -->
        <div id="map" style="height:400px; width:100%;"></div>
      </div>
    </div>
  </div>
</section>

<!-- Leaflet JS (ADDED) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
 integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
 crossorigin=""></script>

<!-- Map Script (ADDED) -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const map = L.map('map').setView([0, 0], 2); 

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const marker = L.marker([0, 0]).addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function (position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                map.setView([lat, lng], 13);
                marker.setLatLng([lat, lng])
                      .bindPopup(`<b>Your Location:</b><br>Lat: ${lat.toFixed(4)}<br>Lng: ${lng.toFixed(4)}`)
                      .openPopup();
            },
            function (error) {
                console.error("Geolocation error: ", error.message);
                alert("Error: " + error.message);
            },
            { enableHighAccuracy: true }
        );
    } else {
        alert("Geolocation is not supported by your browser.");
    }
});
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your JS -->
<script src="./js/navfoot.js"></script>

</body>
</html>
